name: Run Python Script

on:
  workflow_dispatch:
  schedule: # Run every week sunday at 0:00 JST (Saturday 15:00 UTC)
    - cron: '0 15 * * 0'

jobs:
  run-script:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Run Python script
      env:
        BEARER_TOKEN: ${{ secrets.BEARER_TOKEN }}
      run: |
        python get_fixed_post/main.py

    - name: Check for changes
      id: check_changes
      run: |
        git add .
        if git diff --cached --quiet; then
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
        else
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Configure Git
      if: steps.check_changes.outputs.has_changes == 'true'
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Commit changes
      if: steps.check_changes.outputs.has_changes == 'true'
      run: |
        git commit -m "Update generated files"

    - name: Create Pull Request
      if: steps.check_changes.outputs.has_changes == 'true'
      id: create_pr
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.PULL_REQUEST_TOKEN }}
        commit-message: "Update generated files"
        branch: update-generated-files
        title: "Update generated files"
        body: "This PR updates the generated files."
        labels: "auto-merge"
        base: main
        delete-branch: true

    - name: Enable auto-merge
      if: steps.check_changes.outputs.has_changes == 'true'
      uses: peter-evans/enable-pull-request-automerge@v3
      with:
        pull-request-number: ${{ steps.create_pr.outputs.pull-request-number }}
        token: ${{ secrets.PULL_REQUEST_TOKEN }}
          